<!DOCTYPE html>
<html>
<head>
  <title>Flappy Bird Final Project</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section id="home">
  <h1>Flappy Bird Game</h1>
  <button id="startBtn">Start Game</button>
</section>

<section id="gameSection">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
</section>

<section id="instructions">
  <h2>Instructions</h2>
  <p>Press SPACE to jump and avoid pipes.</p>
</section>

<section id="about">
  <h2>About</h2>
  <p>This is a Flappy Bird-style game built using HTML, CSS, JavaScript, and Chart.js.</p>
</section>

<section id="gameOverScreen" style="display:none;">
  <h2>Game Over</h2>
  <p id="finalScore"></p>
  <button onclick="startGame()">Play Again</button>
  <canvas id="scoreChart" width="300" height="200"></canvas>
</section>

<script src="script.js"></script>

</body>
</html>
